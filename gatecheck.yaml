defaults:
  changed: untracked,unstaged,staged,branch:main
  target: all
checks:
  - name: oxfmt
    match: \.((m|c)?(j|t)sx?|json|jsonc)$
    group: format
    command: bunx oxfmt --ignore-path .gitignore --no-error-on-unmatched-pattern {{ ctx.CHANGED_FILES }}
  - name: oxlint
    match: \.((m|c)?(j|t)sx?|json|jsonc)$
    group: lint
    command: bunx oxlint --ignore-path .gitignore --fix {{ ctx.CHANGED_FILES }}
  - name: typecheck
    match: \.(m|c)?tsx?$
    group: typecheck
    command: turbo run check
  - name: vitest
    match: \.(m|c)?(j|t)sx?$
    group: test
    command: turbo run test
