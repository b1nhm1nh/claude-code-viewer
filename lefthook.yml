pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --no-banner
      skip:
        - merge

    oxlint:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: bun run fix:oxlint {staged_files}
      stage_fixed: true

    oxfmt:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: bun run fix:oxfmt {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    lint:
      run: bun run lint

    typecheck:
      run: bun run typecheck

    test:
      # Skipped on Windows: test suite has path-separator incompatibilities; Linux CI is the source of truth.
      skip:
        - run: 'if [ "$OS" = "Windows_NT" ]; then echo skip; fi'
      run: bun run test

    lingui-check:
      # Skipped on Windows: lingui-check.sh and `git diff --exit-code` have shell quirks on Windows.
      skip:
        - run: 'if [ "$OS" = "Windows_NT" ]; then echo skip; fi'
      run: |
        bun run lingui:extract
        bun run lingui:compile
        ./scripts/lingui-check.sh
        ./scripts/i18n-check-key-equals-translation.sh
        git diff --exit-code ./src/lib/i18n/locales/ || echo "Warning: lingui compilation produced unexpected changes"
